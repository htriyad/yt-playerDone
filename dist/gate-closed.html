<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Private — loveurhum</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0a0a0f;font-family:'Segoe UI',system-ui,sans-serif;color:#e8e8f0;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .scene{text-align:center;padding:2rem}
  .lock{font-size:4rem;margin-bottom:1.5rem;animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  h1{font-size:1.8rem;font-weight:700;letter-spacing:-.02em;color:#fff;margin-bottom:.75rem}
  p{color:#6b6b80;font-size:1rem;line-height:1.6;max-width:360px;margin:0 auto}
  .dots{margin-top:2.5rem;display:flex;gap:.5rem;justify-content:center}
  .dot{width:6px;height:6px;border-radius:50%;background:#3a3a50;animation:blink 1.4s ease-in-out infinite}
  .dot:nth-child(2){animation-delay:.2s}
  .dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
</style>
</head>
<body>
<div class="scene">
  <div class="lock">🔒</div>
  <h1>This site is private</h1>
  <p>Access is restricted. Please check back later or contact the site owner.</p>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
</body>
</html>
