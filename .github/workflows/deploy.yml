name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy-pages:
    name: Deploy to loveurhum.pages.dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter @workspace/yt-player run build
        env:
          PORT: '3000'
          BASE_PATH: '/'

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@latest pages deploy artifacts/yt-player/dist/public --project-name=loveurhum --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
